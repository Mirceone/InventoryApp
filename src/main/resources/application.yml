server:
  port: 8080

spring:
  application:
    name: InventoryApp

  servlet:
    multipart:
      max-file-size: ${APP_STORAGE_MAX_FILE_SIZE:1GB}
      max-request-size: ${APP_STORAGE_MAX_REQUEST_SIZE:3GB}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inventoryapp}
    username: ${DB_USERNAME:mirceone}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true

logging:
  level:
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    # Fără secret explicit, aplicația generează unul la startup DOAR în profilele dev/local/test;
    # în orice alt profil pornirea eșuează (vezi JwtConfig). Trebuie Base64, minim 256 biți.
    issuer: ${APP_JWT_ISSUER:http://localhost:8080}
    secret: ${APP_JWT_SECRET:}
    access-token-ttl-seconds: ${APP_JWT_ACCESS_TOKEN_TTL_SECONDS:3600}
    refresh-token-ttl-seconds: ${APP_JWT_REFRESH_TOKEN_TTL_SECONDS:1209600}
    max-active-refresh-tokens-per-user: ${APP_JWT_MAX_ACTIVE_REFRESH_TOKENS_PER_USER:5}
  security:
    rate-limit:
      # Setează true DOAR când rulezi în spatele unui reverse proxy de încredere care adaugă
      # X-Forwarded-For; altfel clienții și-ar putea falsifica cheia de rate-limit.
      trust-forwarded-for: ${APP_SECURITY_RATE_LIMIT_TRUST_FORWARDED_FOR:false}
      auth:
        max-requests: ${APP_SECURITY_RATE_LIMIT_AUTH_MAX_REQUESTS:20}
        window-seconds: ${APP_SECURITY_RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
      documents:
        max-requests: ${APP_SECURITY_RATE_LIMIT_DOCUMENTS_MAX_REQUESTS:30}
        window-seconds: ${APP_SECURITY_RATE_LIMIT_DOCUMENTS_WINDOW_SECONDS:60}
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:5173}

  db:
    create-if-missing: ${APP_DB_CREATE_IF_MISSING:true}

  inventory:
    default-reorder-threshold: ${APP_DEFAULT_REORDER_THRESHOLD:4}

  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}

  password-reset:
    token-ttl-seconds: ${APP_PASSWORD_RESET_TOKEN_TTL_SECONDS:1800}

  invitations:
    token-ttl-seconds: ${APP_INVITATIONS_TOKEN_TTL_SECONDS:604800}

  firms:
    ownership-transfer-confirmation-ttl-seconds: ${APP_FIRMS_OWNERSHIP_TRANSFER_CONFIRMATION_TTL_SECONDS:900}

  email:
    resend:
      api-key: ${RESEND_API_KEY:}
      from: ${RESEND_FROM:InventoryApp <onboarding@resend.dev>}

  features:
    routes-enabled: ${APP_FEATURES_ROUTES:true}
    work-order-enabled: ${APP_FEATURES_WORK_ORDER:true}
    work-order-ai-enabled: ${APP_FEATURES_WORK_ORDER_AI:true}
    invoice-extraction-enabled: ${APP_FEATURES_INVOICE_EXTRACTION:true}
    ops-enabled: ${APP_FEATURES_OPS:true}

  ai:
    provider: ${APP_AI_PROVIDER:mlx}
    base-url: ${APP_AI_BASE_URL:http://127.0.0.1:8000/v1}
    api-key: ${APP_AI_API_KEY:mlx-local}
    model: ${APP_AI_MODEL:mlx-community/gemma-4-12B-it-qat-4bit}
    huggingface-repo: ${APP_AI_HUGGINGFACE_REPO:mlx-community/gemma-4-12B-it-qat-4bit}
    model-cache-dir: ${APP_AI_MODEL_CACHE_DIR:}
    auto-download-model: ${APP_AI_AUTO_DOWNLOAD_MODEL:true}
    auto-start-server: ${APP_AI_AUTO_START_SERVER:true}
    server-port: ${APP_AI_SERVER_PORT:8000}
    model-download-timeout: ${APP_AI_MODEL_DOWNLOAD_TIMEOUT:60m}
    server-start-timeout: ${APP_AI_SERVER_START_TIMEOUT:10m}
    mlx-python-command: ${APP_AI_MLX_PYTHON_COMMAND:python3}
    ensure-model-script-path: ${APP_AI_ENSURE_MODEL_SCRIPT_PATH:}
    timeout: ${APP_AI_TIMEOUT:120s}
    max-retries: ${APP_AI_MAX_RETRIES:2}

  files:
    classification-poll-interval: ${APP_FILES_CLASSIFICATION_POLL_INTERVAL:2s}
    classification-batch-size: ${APP_FILES_CLASSIFICATION_BATCH_SIZE:10}

  documents:
    page-max-size: ${APP_DOCUMENTS_PAGE_MAX_SIZE:100}
    batch-max-files: ${APP_DOCUMENTS_BATCH_MAX_FILES:50}
    batch-max-total-bytes: ${APP_DOCUMENTS_BATCH_MAX_TOTAL_BYTES:3221225472}

  invoices:
    page-max-size: ${APP_INVOICES_PAGE_MAX_SIZE:100}
    batch-max-files: ${APP_INVOICES_BATCH_MAX_FILES:50}
    batch-max-total-bytes: ${APP_INVOICES_BATCH_MAX_TOTAL_BYTES:3221225472}
    allowed-mime-prefixes:
      - application/pdf
      - image/
    processing-poll-interval: ${APP_INVOICES_PROCESSING_POLL_INTERVAL:2s}
    processing-batch-size: ${APP_INVOICES_PROCESSING_BATCH_SIZE:5}
    structuring-poll-interval: ${APP_INVOICES_STRUCTURING_POLL_INTERVAL:3s}
    structuring-batch-size: ${APP_INVOICES_STRUCTURING_BATCH_SIZE:5}
    # Full path if not on PATH, e.g. ${user.dir}/.venv-markitdown/bin/markitdown or python3 -m markitdown
    markitdown-command: ${APP_INVOICES_MARKITDOWN_COMMAND:markitdown}
    markitdown-timeout: ${APP_INVOICES_MARKITDOWN_TIMEOUT:120s}
    extractor: ${APP_INVOICES_EXTRACTOR:markitdown}
    # VLM fallback for scanned PDFs / image invoices (replaces the former OCR path):
    # MarkItDown is used for PDFs with a real text layer; otherwise pages are rasterized and
    # sent to the local vision model.
    vlm-max-pages: ${APP_INVOICES_VLM_MAX_PAGES:8}
    vlm-render-dpi: ${APP_INVOICES_VLM_RENDER_DPI:200}

  storage:
    root: ${APP_STORAGE_ROOT:${user.home}/.inventoryapp/uploads}
    max-file-size-bytes: ${APP_STORAGE_MAX_FILE_SIZE_BYTES:1073741824}
    # Non-empty list: only these MIME types (prefix match, e.g. image/). Empty = allow any.
    allowed-mime-prefixes: []

  ops:
    api-key: ${APP_OPS_API_KEY:}
    log-ring-max-lines: ${APP_OPS_LOG_RING_MAX_LINES:500}
    log-ring-enabled: ${APP_OPS_LOG_RING_ENABLED:true}
