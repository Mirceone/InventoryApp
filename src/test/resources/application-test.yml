# Profil test: H2 in-memory (CI + local), migrari Flyway in db/migration/h2 (fara pgcrypto).
# Productia ramane PostgreSQL cu scripturile din src/main/resources/db/migration.

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    clean-disabled: false
    locations: classpath:db/migration/h2

app:
  db:
    create-if-missing: false
