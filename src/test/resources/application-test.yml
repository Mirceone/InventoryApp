# Profil test: PostgreSQL dedicat (local + CI). Aceleasi migrari Flyway ca in productie
# (classpath:db/migration din src/main/resources). La startup: clean + migrate (vezi IntegrationTestFlywayConfig).
#
# Local: creeaza o data baza, ex. CREATE DATABASE inventoryapp_test;
# Variabile: TEST_DB_URL, TEST_DB_USERNAME, TEST_DB_PASSWORD

spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/inventoryapp_test}
    username: ${TEST_DB_USERNAME:${DB_USERNAME:mirceone}}
    password: ${TEST_DB_PASSWORD:${DB_PASSWORD:postgres}}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    clean-disabled: false

app:
  db:
    create-if-missing: false
