# Profil pentru teste de integrare: aceeasi migrari Flyway ca in productie,
# baza de date separata (ex. inventoryapp_test). Creeaza baza o data in Postgres:
#   CREATE DATABASE inventoryapp_test;
#
# Variabile optionale: TEST_DB_URL, TEST_DB_USERNAME, TEST_DB_PASSWORD
# (fallback la DB_USERNAME / DB_PASSWORD din mediul local sau valorile de mai jos)

spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/inventoryapp_test}
    username: ${TEST_DB_USERNAME:${DB_USERNAME:mirceone}}
    password: ${TEST_DB_PASSWORD:${DB_PASSWORD:postgres}}

  flyway:
    enabled: true
    # Necesar pentru strategia clean+migrate din IntegrationTestFlywayConfig
    clean-disabled: false

app:
  db:
    create-if-missing: false
