# Build + teste Maven pe push/PR către main.
# Testele de integrare folosesc PostgreSQL (serviciu in job).
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: inventoryapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d inventoryapp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Pe runner (fara job container), porturile serviciului sunt mapate pe localhost.
      TEST_DB_URL: jdbc:postgresql://localhost:5432/inventoryapp_test
      TEST_DB_USERNAME: test
      TEST_DB_PASSWORD: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: "22"
          distribution: temurin
          cache: maven

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U test && exit 0
            sleep 1
          done
          exit 1

      - name: Run tests
        run: mvn -B test --file pom.xml
